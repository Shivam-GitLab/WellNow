spring:
  application:
    name: WellNow
#  security:
#    user:
#      name: admin
#      password: admin123

  datasource:
    url: jdbc:mysql://localhost:3306/wellnow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
#      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

logging:
  level:
    org.springframework: INFO
    com.warenova.wms: DEBUG
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n"
